services:
  fastapi:
    build: 
      context: .
      dockerfile: Dockerfile

    image: project-03-fastapi

    container_name: project-03-fastapi-cont

    ports:
      - "8000:8000"

  postgres:
    image: postgres:16

    container_name: project-03-postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7

    container_name: project-03-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data:


  